name: Update contribution graph

on:
  schedule:
    - cron: '20 2 * * *' # daily, 02:20 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/generate-contribs.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/contributions.svg
          git diff --cached --quiet || (git commit -m "chore: refresh contribution graph" && git push)
