<svg viewBox="0 0 760 464" width="760" height="464" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pranav's terminal">
  <style>
    text {
      font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', Menlo, Consolas, 'DejaVu Sans Mono', monospace;
      font-size: 14px;
      white-space: pre;
    }
    .title  { font-size: 12px; fill: #9B9A97; }
    .fg     { fill: #E8E6E3; }
    .bold   { font-weight: 600; }
    .muted  { fill: #9B9A97; }
    .orange { fill: #D97757; }
    .green  { fill: #7CC379; }

    /* ── fade-in (outputs, chrome) ─────────────────────────── */
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    .fade { opacity: 0; animation: fadein .35s ease-out both; }

    .welcome { animation-delay: .25s; }
    .o1 { animation-delay: 1.75s; }
    .o2 { animation-delay: 3.55s; }
    .o3 { animation-delay: 5.15s; }
    .o4 { animation-delay: 7.05s; }
    .status { animation-delay: 7.8s; }

    /* ── typewriter (commands) ─────────────────────────────── */
    @keyframes type {
      from { clip-path: inset(-4px 100% -4px 0); }
      to   { clip-path: inset(-4px -4px -4px 0); }
    }
    .cmd { opacity: 0; animation: fadein .01s both, type .01s both; }
    .c1 { animation-delay: 1.0s; animation-duration: .01s, .55s; animation-timing-function: linear, steps(8); }
    .c2 { animation-delay: 2.6s; animation-duration: .01s, .70s; animation-timing-function: linear, steps(14); }
    .c3 { animation-delay: 4.4s; animation-duration: .01s, .50s; animation-timing-function: linear, steps(9); }
    .c4 { animation-delay: 6.0s; animation-duration: .01s, .80s; animation-timing-function: linear, steps(22); }
    .p1 { animation-delay: .95s; }
    .p2 { animation-delay: 2.55s; }
    .p3 { animation-delay: 4.35s; }
    .p4 { animation-delay: 5.95s; }

    /* ── Claude Code spinner: · ✢ ✳ ✶ ✽ ✻ (holds on ends) ── */
    .sp { opacity: 0; animation: 1.6s linear infinite; }
    @keyframes sp1 { 0%, 21.9% { opacity: 1; } 22%, 100% { opacity: 0; } }
    @keyframes sp2 { 0%, 21.9% { opacity: 0; } 22%, 35.9% { opacity: 1; } 36%, 100% { opacity: 0; } }
    @keyframes sp3 { 0%, 35.9% { opacity: 0; } 36%, 49.9% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @keyframes sp4 { 0%, 49.9% { opacity: 0; } 50%, 63.9% { opacity: 1; } 64%, 100% { opacity: 0; } }
    @keyframes sp5 { 0%, 63.9% { opacity: 0; } 64%, 77.9% { opacity: 1; } 78%, 100% { opacity: 0; } }
    @keyframes sp6 { 0%, 77.9% { opacity: 0; } 78%, 100% { opacity: 1; } }
    .sp-1 { animation-name: sp1; }
    .sp-2 { animation-name: sp2; }
    .sp-3 { animation-name: sp3; }
    .sp-4 { animation-name: sp4; }
    .sp-5 { animation-name: sp5; }
    .sp-6 { animation-name: sp6; }

    /* ── blinking block cursor ─────────────────────────────── */
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .cursor { opacity: 0; animation: fadein .01s 8.2s both, blink 1.1s step-end 8.2s infinite; }
    .lastprompt { animation-delay: 8.1s; }
  </style>

  <!-- ── window chrome ─────────────────────────────────────── -->
  <rect x="1" y="1" width="758" height="462" rx="12" fill="#1B1A19" stroke="#383734" stroke-width="1.5"/>
  <path d="M1 37 h758" stroke="#383734" stroke-width="1"/>
  <circle cx="24" cy="19" r="6" fill="#FF5F57"/>
  <circle cx="44" cy="19" r="6" fill="#FEBC2E"/>
  <circle cx="64" cy="19" r="6" fill="#28C840"/>
  <text x="380" y="23" text-anchor="middle" class="title">pranav@snowrlax — ~/portfolio</text>

  <!-- ── welcome box (Claude Code style) ───────────────────── -->
  <g class="fade welcome">
    <rect x="36" y="56" width="688" height="76" rx="8" fill="none" stroke="#D97757" stroke-width="1.3"/>
    <g transform="translate(56, 88)">
      <text class="orange sp sp-1">·</text>
      <text class="orange sp sp-2">✢</text>
      <text class="orange sp sp-3">✳</text>
      <text class="orange sp sp-4">✶</text>
      <text class="orange sp sp-5">✽</text>
      <text class="orange sp sp-6">✻</text>
    </g>
    <text x="76" y="88" class="fg bold">Welcome to Pranav's profile!</text>
    <text x="76" y="114" class="muted">cwd: ~/pranav-sonawane   ·   backend systems &amp; AI agents</text>
  </g>

  <!-- ── session ───────────────────────────────────────────── -->
  <text x="48" y="170" class="green fade p1">&gt;</text>
  <text x="66" y="170" class="fg cmd c1">whoami</text>
  <text x="66" y="196" class="muted fade o1">Pranav Sonawane — Software Engineer · AI Agent Developer · Pune, IN</text>

  <text x="48" y="234" class="green fade p2">&gt;</text>
  <text x="66" y="234" class="fg cmd c2">cat stack.txt</text>
  <text x="66" y="260" class="muted fade o2">python · typescript · java · fastapi · next.js · postgres · docker</text>

  <text x="48" y="298" class="green fade p3">&gt;</text>
  <text x="66" y="298" class="fg cmd c3">ls ~/ai/</text>
  <text x="66" y="324" class="orange fade o3">langchain/  langgraph/  rag-pipelines/  mcp-servers/  chroma/  huggingface/</text>

  <text x="48" y="362" class="green fade p4">&gt;</text>
  <text x="66" y="362" class="fg cmd c4">connect --with pranav</text>
  <text x="66" y="388" class="muted fade o4">mail: sonawanepranav19@gmail.com   ·   web: pranavsonawane.com</text>

  <!-- ── status line + cursor ──────────────────────────────── -->
  <g class="fade status">
    <g transform="translate(48, 426)">
      <text class="orange sp sp-1">·</text>
      <text class="orange sp sp-2">✢</text>
      <text class="orange sp sp-3">✳</text>
      <text class="orange sp sp-4">✶</text>
      <text class="orange sp sp-5">✽</text>
      <text class="orange sp sp-6">✻</text>
    </g>
    <text x="68" y="426" class="muted">Shipping agents to production… <tspan class="orange">(2 yrs and counting · esc to interrupt)</tspan></text>
  </g>
  <rect x="678" y="413" width="9" height="17" fill="#E8E6E3" class="cursor"/>
</svg>
